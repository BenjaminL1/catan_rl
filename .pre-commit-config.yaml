repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
        # The two 1080p game-1 golden frames are required CI fixtures for the
        # human-data board-CV / openings tests (build brief §6); 1080p is
        # mandatory (360-480p OCRs to garbage). Keep the guard everywhere else.
        exclude: ^tests/fixtures/human_data/game1_(postsetup_t247|empty_baseline_t105)\.png$
      - id: check-merge-conflict
      - id: mixed-line-ending
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies: [types-PyYAML]
        args: [--ignore-missing-imports]
