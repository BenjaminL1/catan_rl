# Phase 2 full bundle: all four architecture upgrades active on top of Phase 1.
#
# 2.1 use_axial_pos_emb=True (board topology in tile encoder)
# 2.2 transformer_dropout=0.05, transformer_activation='gelu' (pre-norm + modern recipe)
# 2.4 action_head_film=True (AdaLN/FiLM-conditioned action heads)
# 2.5 value_head_mode='decoupled' (separate observation encoder for value tower)
#
# Inherits Phase 1 invariants:
#  - compact obs (use_thermometer_encoding=False, dims 54/61)
#  - count-based dev-card encoding (use_devcard_mha=False)
#  - rollout advantage normalization
#  - PPO2 value clipping
#  - 50% per-minibatch D6 symmetry augmentation
#
# Run from scratch (Phase 1 already broke checkpoint compatibility). Compare
# against phase1_full at 5M steps to gate progression to Phase 3.
_base: _base.yaml

model:
  # Phase 1 compact obs schema.
  curr_player_main_in_dim: 54
  other_player_main_in_dim: 61
  # Phase 2.1 axial positional embedding.
  use_axial_pos_emb: true
  axial_pos_dim: 24
  # Phase 2.2 transformer recipe.
  transformer_dropout: 0.05
  transformer_activation: gelu
  # Phase 2.4 AdaLN action heads.
  action_head_film: true
  # Phase 2.5 decoupled value tower.
  value_head_mode: decoupled

ppo:
  # Phase 1.1 + 1.2
  use_value_clipping: true
  clip_range_vf: 0.2
  advantage_norm: rollout

phase1:
  # 1.3 obs encoding switch
  use_thermometer_encoding: false
  # 1.4 dev-card encoding switch
  use_devcard_mha: false
  # 1.5 symmetry augmentation
  symmetry_aug_prob: 0.5

schedule:
  total_timesteps: 5_000_000
