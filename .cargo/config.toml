# Cargo workspace config. Tells the macOS linker to embed the conda
# python's lib dir as a runtime search path so ``cargo test`` (which
# links against libpython unlike ``maturin develop --features
# extension-module``) can find libpython3.12.dylib without manual
# DYLD_FALLBACK_LIBRARY_PATH gymnastics.
#
# The rpath is set per-target so Linux x86_64 (CI runners) follows
# its own discovery — the dynamic linker on Linux finds libpython
# via the conda env's LD_LIBRARY_PATH or the wheel's auditwheel
# RUNPATH, not via this file.

[target.aarch64-apple-darwin]
# Embeds the user's miniconda3 install as a runtime search path.
# CI macOS runners use system Python (homebrew or actions/setup-python)
# which sets DYLD_FALLBACK_LIBRARY_PATH themselves; this rustflag is
# only load-bearing for the dev box.
rustflags = ["-C", "link-arg=-Wl,-rpath,/Users/benjaminli/miniconda3/lib"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-rpath,/Users/benjaminli/miniconda3/lib"]
